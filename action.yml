name: 'Setup OpenCart Environment'
description: 'Spins up a fresh, fully-installed OpenCart 4 store'
author: 'Ivan Stasiuk'
branding:
  icon: 'server'
  color: 'blue'

inputs:
  oc-version:
    description: 'Version of OpenCart 4.x.x.x'
    required: true
    default: '4.0.2.3'
  db-hostname:
    description: 'Database host'
    default: 'mysql'
  db-username:
    description: 'Database username'
    default: 'root'
  db-password:
    description: 'Database password'
    required: true
  db-port:
    description: 'Database port'
    default: '3306'
  admin-password:
    description: 'Password for the OpenCart admin user'
    default: 'admin_pass'

runs:
  using: "composite"
  steps:
    - name: Build and Run OpenCart
      shell: bash
      run: |
        # Build the image from the Dockerfile in the action's directory
        docker build -t opencart-env ${{ github.action_path }}

        # Run in detached mode (-d) and use host networking so localhost:8080 works
        docker run -d \
          --name opencart-server \
          --network host \
          opencart-env \
          "${{ inputs.oc-version }}" \
          "${{ inputs.db-hostname }}" \
          "${{ inputs.db-username }}" \
          "${{ inputs.db-password }}" \
          "${{ inputs.db-port }}" \
          "${{ inputs.admin-password }}"

        # Give it a moment to initialize the DB and start Apache
        echo "Waiting for OpenCart to initialize..."
        sleep 10